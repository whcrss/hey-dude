<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Will you be my friend? 🐻</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #1a0030;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated rainbow background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #1a0030, #3d0060, #0d0050, #001a4d, #003320);
      background-size: 400% 400%;
      animation: bgShift 8s ease infinite;
      z-index: 0;
    }

    @keyframes bgShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    /* Floating stars bg */
    .star {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      animation: twinkle var(--dur) ease-in-out infinite;
      background: white;
      z-index: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.1; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    /* QUESTION SCREEN */
    #question-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      z-index: 2;
      position: relative;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 32px;
      padding: 48px 60px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 60px rgba(180,0,255,0.3), 0 0 120px rgba(0,100,255,0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .sticker {
      font-size: 90px;
      animation: bounce 1.2s ease-in-out infinite;
      line-height: 1;
      filter: drop-shadow(0 0 20px rgba(255,150,255,0.8));
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50% { transform: translateY(-14px) rotate(3deg); }
    }

    .question {
      font-family: 'Fredoka One', cursive;
      font-size: 2.4rem;
      background: linear-gradient(90deg, #ff6eb0, #ffd700, #00e5ff, #ff6eb0);
      background-size: 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: rainbowText 3s linear infinite;
      text-shadow: none;
    }

    @keyframes rainbowText {
      0% { background-position: 0%; }
      100% { background-position: 300%; }
    }

    #yes-btn {
      background: linear-gradient(135deg, #ff3cac, #784ba0, #2b86c5);
      background-size: 200%;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 16px 48px;
      font-size: 1.3rem;
      font-weight: 900;
      font-family: 'Fredoka One', cursive;
      cursor: pointer;
      letter-spacing: 1px;
      animation: btnGlow 2s ease-in-out infinite;
      transition: transform 0.15s;
      position: relative;
    }
    #yes-btn:hover { transform: scale(1.1); }
    #yes-btn:active { transform: scale(0.96); }

    @keyframes btnGlow {
      0%, 100% { box-shadow: 0 0 20px #ff3cac, 0 0 40px #784ba0; }
      50% { box-shadow: 0 0 40px #2b86c5, 0 0 80px #ff3cac; }
    }

    #no-btn {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5);
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 50px;
      padding: 12px 32px;
      font-size: 1rem;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      position: fixed;
      transition: font-size 0.15s, padding 0.15s, opacity 0.3s;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    #hint {
      font-size: 1rem;
      color: #ffd700;
      font-style: italic;
      min-height: 26px;
      text-shadow: 0 0 10px #ffd700;
      animation: hintPulse 1.5s ease-in-out infinite;
    }
    @keyframes hintPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* SPARKLES */
    .sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      animation: sparklePop 0.7s ease-out forwards;
      font-size: 20px;
    }
    @keyframes sparklePop {
      0% { transform: scale(0) rotate(0deg); opacity: 1; }
      60% { transform: scale(1.4) rotate(180deg); opacity: 1; }
      100% { transform: scale(0) rotate(360deg) translateY(-30px); opacity: 0; }
    }

    /* CELEBRATION SCREEN */
    #celebration {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      z-index: 2;
      position: relative;
    }

    .cel-card {
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 32px;
      padding: 48px 64px;
      backdrop-filter: blur(16px);
      box-shadow: 0 0 80px rgba(255,60,172,0.5), 0 0 160px rgba(43,134,197,0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .big-emoji {
      font-size: 90px;
      animation: celebSpin 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      filter: drop-shadow(0 0 30px rgba(255,215,0,0.9));
    }
    @keyframes celebSpin {
      0% { transform: scale(0) rotate(-30deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    #celebration h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 3rem;
      background: linear-gradient(90deg, #ffd700, #ff6eb0, #00e5ff, #ffd700);
      background-size: 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: rainbowText 2s linear infinite;
    }

    #celebration .sub {
      font-family: 'Fredoka One', cursive;
      font-size: 1.6rem;
      color: #ff6eb0;
      text-shadow: 0 0 20px #ff6eb0;
      animation: subPulse 1.5s ease-in-out infinite;
    }
    @keyframes subPulse {
      0%, 100% { text-shadow: 0 0 20px #ff6eb0; }
      50% { text-shadow: 0 0 40px #ffd700, 0 0 60px #ff6eb0; }
    }

    #celebration .note {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.7);
    }

    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 100;
    }

    /* Floating hearts */
    .float-heart {
      position: fixed;
      pointer-events: none;
      font-size: 24px;
      animation: floatUp var(--dur2) ease-in forwards;
      z-index: 5;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-200px) scale(0.3); opacity: 0; }
    }
  </style>
</head>
<body>
<div id="app">
  <canvas id="confetti-canvas"></canvas>

  <div id="question-screen">
    <div class="card">
      <div class="sticker">🐻🐼</div>
      <div class="question">Will you be my friend?</div>
      <button id="yes-btn" onclick="onYes()">✨ Yes! 💕 ✨</button>
      <div id="hint"></div>
    </div>
  </div>

  <div id="celebration">
    <div class="cel-card">
      <div class="big-emoji">🎉🥳🎊</div>
      <h1>Congratulations!</h1>
      <div class="sub">🌟 You're my friend now! 🌟</div>
      <div class="note">No take-backs. It's official. 🤝💖</div>
    </div>
  </div>
</div>

<script>
  // Create twinkling stars
  for (let i = 0; i < 60; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 3 + 1;
    star.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}vw; top:${Math.random()*100}vh;
      --dur:${Math.random()*2+1}s;
      animation-delay:${Math.random()*3}s;
    `;
    document.body.appendChild(star);
  }

  let noClicks = 0;
  const hints = [
    "", "", "Hmm... are you sure? 🤔",
    "That's not the right button! 😅",
    "You keep missing... 👀",
    "Maybe try the other one? 💕",
    "The No button is running away... 😴",
    "Just click Yes already! 🥺",
    "No is scared of you now 😂",
    "Okay No is dead now 💀 Click Yes!",
  ];

  const noBtn = document.createElement('button');
  noBtn.id = 'no-btn';
  noBtn.textContent = 'No';
  noBtn.onclick = onNo;
  document.body.appendChild(noBtn);

  function placeNoBtnInitial() {
    const yesBtn = document.getElementById('yes-btn');
    const rect = yesBtn.getBoundingClientRect();
    noBtn.style.left = (rect.right + 20) + 'px';
    noBtn.style.top = rect.top + 'px';
  }
  window.addEventListener('load', placeNoBtnInitial);
  window.addEventListener('resize', () => { if (noClicks === 0) placeNoBtnInitial(); });

  function spawnSparkle(x, y) {
    const emojis = ['✨','⭐','💫','🌟','💥','🎇'];
    for (let i = 0; i < 5; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      s.style.left = (x + (Math.random()-0.5)*80) + 'px';
      s.style.top = (y + (Math.random()-0.5)*80) + 'px';
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 700);
    }
  }

  function spawnHeart(x, y) {
    const hearts = ['💕','💖','💗','💓','💝'];
    const h = document.createElement('div');
    h.className = 'float-heart';
    h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    h.style.left = x + 'px';
    h.style.top = y + 'px';
    h.style.setProperty('--dur2', (Math.random()*0.8+0.8) + 's');
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 1600);
  }

  document.getElementById('yes-btn').addEventListener('mousemove', (e) => {
    if (Math.random() > 0.7) spawnHeart(e.clientX, e.clientY);
  });

  function onNo() {
    noClicks++;
    const size = Math.max(8, 16 - noClicks * 1.2);
    const px = Math.max(8, 32 - noClicks * 2);
    const py = Math.max(3, 12 - noClicks);
    noBtn.style.fontSize = size + 'px';
    noBtn.style.padding = py + 'px ' + px + 'px';
    if (noClicks >= 5) noBtn.style.opacity = String(Math.max(0.1, 0.8 - noClicks * 0.1));

    const margin = 80;
    const maxX = window.innerWidth - noBtn.offsetWidth - margin;
    const maxY = window.innerHeight - noBtn.offsetHeight - margin;
    const nx = Math.random() * maxX + margin / 2;
    const ny = Math.random() * maxY + margin / 2;
    noBtn.style.left = nx + 'px';
    noBtn.style.top = ny + 'px';

    spawnSparkle(nx, ny);

    const hintEl = document.getElementById('hint');
    hintEl.textContent = hints[Math.min(noClicks, hints.length - 1)];

    if (noClicks >= 9) {
      noBtn.disabled = true;
      noBtn.style.opacity = '0.05';
      hintEl.textContent = "No is dead 💀 Just click Yes!";
    }
  }

  function onYes() {
    const btn = document.getElementById('yes-btn');
    const rect = btn.getBoundingClientRect();
    spawnSparkle(rect.left + rect.width/2, rect.top + rect.height/2);

    setTimeout(() => {
      document.getElementById('question-screen').style.display = 'none';
      noBtn.style.display = 'none';
      const cel = document.getElementById('celebration');
      cel.style.display = 'flex';
      startConfetti();
      burstSparkles();
    }, 200);
  }

  function burstSparkles() {
    for (let i = 0; i < 5; i++) {
      setTimeout(() => {
        spawnSparkle(
          Math.random() * window.innerWidth,
          Math.random() * window.innerHeight
        );
      }, i * 200);
    }
  }

  function startConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const colors = [
      '#ff3cac','#ff6eb0','#ffd700','#fff176',
      '#00e5ff','#80deea','#b39ddb','#ce93d8',
      '#a5d6a7','#ffcc80','#f48fb1','#ff5252'
    ];

    const shapes = ['rect', 'circle', 'star'];

    const pieces = Array.from({length: 130}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * -canvas.height,
      w: Math.random() * 14 + 5,
      h: Math.random() * 8 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 3,
      vy: Math.random() * 4 + 1.5,
      rot: Math.random() * Math.PI * 2,
      vrot: (Math.random() - 0.5) * 0.25,
      shape: shapes[Math.floor(Math.random() * shapes.length)]
    }));

    let frame = 0;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 6;
        if (p.shape === 'circle') {
          ctx.beginPath();
          ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
          ctx.fill();
        } else if (p.shape === 'star') {
          drawStar(ctx, 0, 0, 5, p.w / 2, p.w / 4);
        } else {
          ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        }
        ctx.restore();
        p.x += p.vx;
        p.y += p.vy;
        p.rot += p.vrot;
        if (p.y > canvas.height + 10) {
          p.y = -10;
          p.x = Math.random() * canvas.width;
        }
      });
      frame++;
      if (frame < 500) requestAnimationFrame(draw);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    draw();

    // Ongoing burst
    setInterval(burstSparkles, 1500);
  }

  function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
    let rot = (Math.PI / 2) * 3;
    const step = Math.PI / spikes;
    ctx.beginPath();
    ctx.moveTo(cx, cy - outerR);
    for (let i = 0; i < spikes; i++) {
      ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
      rot += step;
      ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
      rot += step;
    }
    ctx.lineTo(cx, cy - outerR);
    ctx.closePath();
    ctx.fill();
  }
</script>
</body>
</html>
